{% extends "park_system/base.html" %}
{% load django_bootstrap5 %}

{% block content %}
<div class="col-md-6 mx-auto mt-5">
    <h2>Register New Attendant</h2>
    <form method="POST">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-primary w-100">Create Attendant</button>
    </form>
</div>
{% endblock %}
